[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variabelen voor productie worden ingesteld
# via het Netlify dashboard of via Netlify CLI:
#   netlify env:set DATABASE_URL "postgresql://..."
#
# Voeg hier NOOIT echte credentials toe — gebruik het dashboard.

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Cache headers voor statische assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"
