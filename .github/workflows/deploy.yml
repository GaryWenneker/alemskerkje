name: Build & Deploy to Netlify

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build with Netlify (includes @netlify/plugin-nextjs)
        run: netlify build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          AUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Deploy to Netlify (draft first, then publish via API)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Deploy as draft (no lock issues)
          DEPLOY_OUTPUT=$(netlify deploy --no-build --json 2>/dev/null || netlify deploy --no-build 2>&1)
          echo "$DEPLOY_OUTPUT"
          
          # Extract deploy ID from JSON output (handles both "deploy_id":"x" and "deploy_id": "x")
          DEPLOY_ID=$(echo "$DEPLOY_OUTPUT" | grep -o '"deploy_id"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | grep -o '"[^"]*"$' | tr -d '"')
          if [ -z "$DEPLOY_ID" ]; then
            DEPLOY_ID=$(echo "$DEPLOY_OUTPUT" | grep -o 'unique_deploy_url.*' | grep -o '[a-f0-9]\{24\}' | head -1)
          fi
          
          echo "Deploy ID: $DEPLOY_ID"
          
          # Publish this deploy as production via API
          if [ -n "$DEPLOY_ID" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys/$DEPLOY_ID/restore" \
              | grep -o '"state":"[^"]*"'
            echo "Published deploy $DEPLOY_ID to production"
          else
            echo "Could not extract deploy ID, trying direct --prod"
            # Fallback: try to unlock first, then deploy
            LOCKED_ID=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=1" \
              | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Locked deploy: $LOCKED_ID"
            netlify deploy --no-build --prod || true
          fi

      - name: Deploy preview (PR)
        if: github.event_name == 'pull_request'
        run: netlify deploy --no-build --alias "preview-pr-${{ github.event.number }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
